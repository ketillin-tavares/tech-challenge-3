# =============================================================================
# Deploy continuo na EC2 (primeira vez e atualizacoes).
#
#   1. build-push: builda as DUAS imagens (target runtime) e publica no ECR
#      com as tags <sha> (imutavel, usada no deploy) e latest (conveniencia).
#   2. deploy: publica compose de producao + deploy.sh no S3 e dispara o
#      deploy.sh na instancia via SSM Run Command (sem SSH/porta 22). O passo
#      final acompanha o comando e falha o workflow se o deploy falhar.
#
# Autenticacao via OIDC (role tc3-gha-deploy, criada pelo Terraform principal).
# Actions pinadas por SHA (supply chain: workflow com id-token: write).
# Pre-requisitos: infra.yml aplicado e variable AWS_DEPLOY_ROLE_ARN definida.
# =============================================================================
name: deploy

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "deploy/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write # OIDC (AssumeRoleWithWebIdentity)
  contents: read

# Deploys serializados; nao cancela um deploy em andamento.
concurrency:
  group: deploy
  cancel-in-progress: false

env:
  AWS_REGION: us-east-2

jobs:
  build-push:
    name: build & push (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth, vendas]
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Configura credenciais AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login no ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6

      - name: Build e push da imagem
        env:
          IMAGE: ${{ steps.ecr.outputs.registry }}/tc3-${{ matrix.service }}
        run: |
          docker build \
            --target runtime \
            -t "$IMAGE:${{ github.sha }}" \
            -t "$IMAGE:latest" \
            "services/${{ matrix.service }}"
          docker push --all-tags "$IMAGE"

  deploy:
    name: deploy na EC2 (SSM Run Command)
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Configura credenciais AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Bucket criado pelo Terraform principal: <project>-deploy-<account_id>.
      - name: Publica artefatos de deploy no S3
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="tech-challenge-3-deploy-${ACCOUNT_ID}"
          aws s3 cp deploy/docker-compose.prod.yml "s3://${BUCKET}/deploy/docker-compose.prod.yml"
          aws s3 cp deploy/deploy.sh "s3://${BUCKET}/deploy/deploy.sh"
          echo "BUCKET=${BUCKET}" >> "$GITHUB_ENV"

      - name: Dispara o deploy via SSM Run Command
        run: |
          INSTANCE_ID=$(aws ssm get-parameter \
            --name /tc3/prod/ec2/instance_id \
            --query 'Parameter.Value' --output text)
          # A instancia baixa os artefatos do S3 e executa o deploy.sh.
          cat > /tmp/ssm-parameters.json <<EOF
          {
            "commands": [
              "set -euo pipefail",
              "aws s3 cp s3://${BUCKET}/deploy/docker-compose.prod.yml /opt/tc3/docker-compose.prod.yml",
              "aws s3 cp s3://${BUCKET}/deploy/deploy.sh /opt/tc3/deploy.sh",
              "bash /opt/tc3/deploy.sh ${{ github.sha }}"
            ]
          }
          EOF
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "deploy ${{ github.sha }}" \
            --parameters file:///tmp/ssm-parameters.json \
            --query 'Command.CommandId' --output text)
          echo "INSTANCE_ID=${INSTANCE_ID}" >> "$GITHUB_ENV"
          echo "COMMAND_ID=${COMMAND_ID}" >> "$GITHUB_ENV"

      # Poll manual (o `aws ssm wait` desiste em ~100s; pull + migrations podem
      # demorar mais). Timeout total: 10 minutos.
      - name: Acompanha o resultado do deploy
        run: |
          # Redige DSNs (postgresql://user:senha@...) antes de ecoar qualquer
          # saida da instancia: um traceback das migrations poderia conter a
          # senha do RDS e este log e publico.
          REDACT='s#(postgres[^[:space:]]*://[^:@[:space:]]+:)[^@[:space:]]+@#\1***@#g'
          STATUS="Pending"
          for _ in $(seq 1 60); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
              --query 'Status' --output text)
            echo "status: $STATUS"
            case "$STATUS" in
              Success|Failed|Cancelled|TimedOut) break ;;
            esac
          done
          echo "--- stdout ---"
          aws ssm get-command-invocation --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" --query 'StandardOutputContent' --output text \
            | sed -E "$REDACT"
          echo "--- stderr ---"
          aws ssm get-command-invocation --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" --query 'StandardErrorContent' --output text \
            | sed -E "$REDACT"
          [ "$STATUS" = "Success" ] || { echo "deploy falhou: $STATUS"; exit 1; }

# projectKey e organization sao injetados pelo workflow via -D (repository Variables).
# Mantenha aqui apenas config tecnica reutilizavel por qualquer fork.
sonar.projectName=Tech Challenge 3 - Auth

sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=tests/**

sonar.python.version=3.13
sonar.python.coverage.reportPaths=coverage.xml

sonar.exclusions=**/__pycache__/**,**/migrations/**,**/alembic/versions/**
sonar.coverage.exclusions=tests/**,src/main.py,**/migrations/**,**/alembic/**

sonar.sourceEncoding=UTF-8
